name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          GEMSPEC_VERSION=$(ruby -e "require 'rubygems'; spec = Gem::Specification.load('allstak.gemspec'); puts spec.version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$GEMSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: gemspec=$GEMSPEC_VERSION tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $GEMSPEC_VERSION"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build
        run: gem build allstak.gemspec

      - name: Publish
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          gem push "allstak-${VERSION}.gem"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: allstak-*.gem
