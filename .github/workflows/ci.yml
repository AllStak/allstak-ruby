name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ['3.2', '3.3']
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: |
          if [ -f Rakefile ]; then bundle exec rake; \
          elif [ -d spec ]; then bundle exec rspec; \
          elif [ -d test ]; then bundle exec rake test; \
          else echo "no test suite found"; fi

      - name: Build gem
        run: gem build allstak.gemspec
